<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>REEL — Cinema Rediscovered</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Outfit:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --bg:#08090f;--bg2:#0e1018;--bg3:#14151f;
  --glass:rgba(14,16,26,0.75);
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.13);
  --red:#c1121f;--red-hi:#e63946;--red-glow:rgba(193,18,31,0.32);
  --gold:#ffd166;--teal:#48cae4;
  --text:#f0ece4;--text-dim:#857e95;
  --radius:14px;--radius-lg:22px;
  --nav-h:68px;
  --ff-head:'Playfair Display',Georgia,serif;
  --ff-label:'Bebas Neue',sans-serif;
  --ff-body:'Outfit',sans-serif;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --spring:cubic-bezier(0.34,1.56,0.64,1);
}
body{font-family:var(--ff-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;cursor:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(193,18,31,0.4);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--red)}
img{display:block}button{font-family:var(--ff-body);cursor:none}

/* NOISE */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");background-size:180px 180px;opacity:0.032;pointer-events:none;z-index:9998}

/* CUSTOM CURSOR */
#cur{position:fixed;width:10px;height:10px;background:var(--red-hi);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .25s var(--spring),height .25s var(--spring),background .2s}
#cur-ring{position:fixed;width:38px;height:38px;border:1.5px solid rgba(193,18,31,0.5);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .35s var(--spring),height .35s var(--spring),border-color .25s}
body.ch #cur{width:6px;height:6px;background:var(--gold)}
body.ch #cur-ring{width:52px;height:52px;border-color:rgba(255,209,102,0.55)}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:99990;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity .7s var(--ease),visibility .7s}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.spl-logo{font-family:var(--ff-label);font-size:5rem;letter-spacing:.3em;color:#fff;animation:splP 1.2s ease-in-out infinite alternate}
.spl-logo span{color:var(--red)}
.spl-bar{display:flex;gap:7px}
.spl-d{width:8px;height:8px;border-radius:50%;background:var(--red);animation:splD 1.4s ease-in-out infinite}
.spl-d:nth-child(2){animation-delay:.2s;background:var(--gold)}
.spl-d:nth-child(3){animation-delay:.4s}
.spl-d:nth-child(4){animation-delay:.6s;background:var(--teal)}
@keyframes splP{from{opacity:.6}to{opacity:1}}
@keyframes splD{0%,100%{transform:scaleY(1);opacity:.4}50%{transform:scaleY(2.2);opacity:1}}

/* NAVBAR */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:9000;display:flex;align-items:center;justify-content:space-between;padding:0 52px;background:linear-gradient(180deg,rgba(8,9,15,.96) 0%,rgba(8,9,15,0) 100%);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);transition:background .3s}
nav.solid{background:rgba(8,9,15,.97)}
.nav-logo{font-family:var(--ff-label);font-size:2rem;letter-spacing:.2em;color:#fff;display:flex;align-items:center;gap:4px;cursor:none}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--red);margin-bottom:14px;box-shadow:0 0 9px var(--red);animation:ndot 2s ease-in-out infinite alternate}
@keyframes ndot{from{opacity:.6;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.nav-pills{display:flex;gap:3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:100px;padding:5px}
.nav-pill{font-size:.72rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:none;border-radius:100px;padding:7px 18px;cursor:none;transition:all .22s var(--ease)}
.nav-pill:hover{color:var(--text)}
.nav-pill.act{color:#fff;background:var(--red);box-shadow:0 2px 14px var(--red-glow)}
.nav-r{display:flex;align-items:center;gap:12px}
.icon-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:none;transition:all .22s;color:var(--text-dim)}
.icon-btn:hover{background:rgba(193,18,31,.15);border-color:var(--red);color:var(--red)}
.icon-btn svg{width:17px;height:17px}

/* SEARCH OVERLAY */
#so{position:fixed;inset:0;z-index:8900;background:rgba(8,9,15,.97);backdrop-filter:blur(28px);display:flex;flex-direction:column;align-items:center;padding-top:130px;opacity:0;visibility:hidden;transition:opacity .35s var(--ease),visibility .35s}
#so.open{opacity:1;visibility:visible}
.so-inner{width:min(700px,92vw)}
.so-label{font-family:var(--ff-head);font-style:italic;font-size:.9rem;color:var(--text-dim);letter-spacing:.07em;margin-bottom:22px;text-align:center}
.so-wrap{position:relative;margin-bottom:14px}
.so-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border-hi);border-radius:var(--radius-lg);color:var(--text);font-family:var(--ff-head);font-size:2rem;font-weight:400;padding:22px 66px 22px 32px;outline:none;transition:border-color .3s,box-shadow .3s}
.so-input::placeholder{color:var(--text-dim);font-style:italic}
.so-input:focus{border-color:var(--red);box-shadow:0 0 0 4px var(--red-glow),0 20px 50px rgba(0,0,0,.5)}
.so-icon{position:absolute;right:22px;top:50%;transform:translateY(-50%);color:var(--red);width:26px;height:26px;pointer-events:none}
.so-close{position:absolute;top:80px;right:52px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:none;color:var(--text-dim);transition:all .2s;font-size:1.2rem}
.so-close:hover{background:var(--red);border-color:var(--red);color:#fff}
.ac-list{background:var(--bg2);border:1px solid var(--border-hi);border-radius:var(--radius);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.7);display:none}
.ac-list.show{display:block}
.ac-item{display:flex;align-items:center;gap:14px;padding:12px 18px;cursor:none;border-bottom:1px solid var(--border);transition:background .15s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:rgba(193,18,31,.12)}
.ac-thumb{width:36px;height:52px;border-radius:6px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.ac-ph{width:36px;height:52px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.ac-name{font-size:.92rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-sub{font-size:.76rem;color:var(--text-dim)}
.so-hint{font-size:.78rem;color:var(--text-dim);text-align:center;margin-top:12px;letter-spacing:.04em}
.so-hint kbd{display:inline-block;padding:2px 8px;border:1px solid var(--border-hi);border-radius:5px;font-family:var(--ff-body);font-size:.72rem;color:var(--text);background:rgba(255,255,255,.05)}

/* HERO */
#hero{position:relative;height:100svh;min-height:600px;max-height:900px;overflow:hidden;display:flex;align-items:flex-end;padding:0 0 80px 72px}
.bd-layer{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 1.8s var(--ease)}
#bda{opacity:1;z-index:1}#bdb{opacity:0;z-index:2}
.hero-ov{position:absolute;inset:0;z-index:3;background:linear-gradient(90deg,rgba(8,9,15,.95) 0%,rgba(8,9,15,.55) 50%,rgba(8,9,15,.08) 100%),linear-gradient(0deg,rgba(8,9,15,.92) 0%,rgba(8,9,15,.25) 40%,transparent 70%)}
.hero-scan{position:absolute;inset:0;z-index:4;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none}
.hero-body{position:relative;z-index:5;max-width:620px;animation:hrv 1.1s .3s both}
@keyframes hrv{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.hero-ew{display:inline-flex;align-items:center;gap:10px;font-family:var(--ff-label);font-size:.88rem;letter-spacing:.22em;color:var(--red);margin-bottom:18px}
.hero-ew::before{content:'';display:block;width:32px;height:2px;background:var(--red);border-radius:1px}
.hero-h1{font-family:var(--ff-head);font-size:clamp(3rem,7vw,5.5rem);font-weight:900;line-height:1.0;color:#fff;margin-bottom:20px}
.hero-h1 em{font-style:italic;color:var(--gold);display:block}
.hero-p{font-size:1.05rem;font-weight:300;color:rgba(240,236,228,.7);max-width:420px;line-height:1.65;margin-bottom:36px}
.hero-acts{display:flex;gap:14px;flex-wrap:wrap}
.hbtn{display:inline-flex;align-items:center;gap:9px;font-size:.8rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;border-radius:100px;padding:14px 30px;cursor:none;transition:all .25s var(--ease);border:none}
.hbtn-p{background:var(--red);color:#fff;box-shadow:0 6px 24px var(--red-glow)}
.hbtn-p:hover{background:var(--red-hi);box-shadow:0 8px 30px var(--red-glow);transform:translateY(-2px)}
.hbtn-s{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border-hi)}
.hbtn-s:hover{background:rgba(255,255,255,.14);transform:translateY(-2px)}
.hero-stats{position:absolute;right:72px;bottom:80px;z-index:5;display:flex;flex-direction:column;gap:24px;align-items:flex-end;animation:hrv 1.1s .6s both}
.h-stat-n{font-family:var(--ff-label);font-size:2.2rem;letter-spacing:.05em;color:#fff;line-height:1}
.h-stat-l{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim)}
.hero-dots{position:absolute;bottom:30px;left:72px;z-index:5;display:flex;gap:8px}
.hdot{width:24px;height:3px;border-radius:2px;background:rgba(255,255,255,.22);cursor:none;transition:all .4s var(--ease)}
.hdot.act{width:40px;background:var(--red);box-shadow:0 0 8px var(--red)}

/* MAIN */
#app-main{padding:0 52px 120px}
.section{margin-top:72px}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sec-title{font-family:var(--ff-head);font-size:1.85rem;font-weight:700;color:#fff}
.sec-title em{font-style:italic;color:var(--red)}
.sec-ct{font-size:.75rem;letter-spacing:.08em;color:var(--text-dim);text-transform:uppercase}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:22px}
@media(min-width:1300px){.grid{grid-template-columns:repeat(6,1fr)}}
@media(max-width:860px){.grid{grid-template-columns:repeat(4,1fr);gap:14px}}
@media(max-width:560px){.grid{grid-template-columns:repeat(3,1fr);gap:10px}}

/* CARD */
.card{position:relative;border-radius:var(--radius);overflow:hidden;background:var(--bg2);cursor:none;transform-style:preserve-3d;transition:box-shadow .35s var(--ease);will-change:transform}
.card:hover{box-shadow:0 24px 60px rgba(0,0,0,.65),0 0 0 1px rgba(193,18,31,.28)}
.card-pw{position:relative;overflow:hidden;aspect-ratio:2/3}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease)}
.card:hover .card-img{transform:scale(1.08)}
.card-ph{aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--bg3);font-size:2.5rem;color:var(--text-dim)}
.card-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 50%,rgba(255,255,255,.04) 100%);opacity:0;transition:opacity .3s;pointer-events:none}
.card:hover .card-shine{opacity:1}
.card-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,9,15,.97) 0%,rgba(8,9,15,.5) 45%,transparent 75%);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.card:hover .card-ov{opacity:1}
.card-obtn{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--red);border-radius:100px;padding:5px 12px;cursor:none;border:none;transition:background .2s,transform .2s;width:fit-content;margin-bottom:6px}
.card-obtn:hover{background:var(--red-hi)}
.card-ov-title{font-size:.8rem;font-weight:500;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-badge{position:absolute;top:10px;right:10px;display:flex;align-items:center;gap:3px;background:rgba(8,9,15,.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:3px 9px;font-size:.7rem;font-weight:600;color:var(--gold);opacity:0;transform:translateY(-4px);transition:all .3s}
.card:hover .card-badge{opacity:1;transform:translateY(0)}
.card-body{padding:10px 12px 14px}
.card-name{font-size:.82rem;font-weight:500;line-height:1.3;color:var(--text);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--text-dim)}

/* SKELETON */
.skel{border-radius:var(--radius);overflow:hidden;background:var(--bg2)}
.skel-p{aspect-ratio:2/3;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:300% 100%;animation:shim 1.6s infinite}
.skel-l{height:11px;border-radius:6px;margin:10px 12px 6px;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:300% 100%;animation:shim 1.6s infinite}
.skel-l.sh{width:55%;margin-top:0}
@keyframes shim{0%{background-position:300% 0}100%{background-position:-300% 0}}

/* SEARCH RESULTS */
#vs{display:none;padding:calc(var(--nav-h) + 48px) 52px 100px;max-width:1600px;margin:0 auto}
#vs.act{display:block}
.sr-head{padding:44px 0 52px;border-bottom:1px solid var(--border);margin-bottom:44px;text-align:center}
.sr-head h2{font-family:var(--ff-head);font-size:2.5rem;font-weight:400;font-style:italic;color:#fff;margin-bottom:8px}
.sr-head h2 strong{color:var(--red);font-style:normal;font-weight:700}
.sr-head p{color:var(--text-dim);font-size:.9rem}

/* DETAILS */
#vd{display:none}#vd.act{display:block}
.dh{position:relative;height:100svh;min-height:600px;max-height:820px;overflow:hidden;display:flex;align-items:flex-end}
.dh-bg{position:absolute;inset:0;background-size:cover;background-position:center top}
.dh-ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,9,15,.97) 0%,rgba(8,9,15,.6) 45%,rgba(8,9,15,.1) 100%),linear-gradient(0deg,rgba(8,9,15,1) 0%,rgba(8,9,15,.55) 30%,transparent 60%)}
.dh-content{position:relative;z-index:2;display:flex;gap:44px;align-items:flex-end;padding:0 72px 72px;width:100%;animation:hrv .8s both}
.dp-box{flex-shrink:0;width:clamp(150px,12vw,200px);border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.08);transition:transform .3s var(--spring)}
.dp-box:hover{transform:translateY(-5px)}
.dp-box img{width:100%;display:block}
.dp-ph{width:clamp(150px,12vw,200px);aspect-ratio:2/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:3rem;border-radius:14px}
.dm{flex:1;min-width:0}
.dg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.gpill{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--red);border:1px solid rgba(193,18,31,.35);border-radius:100px;padding:4px 12px;background:rgba(193,18,31,.08)}
.dt{font-family:var(--ff-head);font-size:clamp(2rem,5vw,4rem);font-weight:900;line-height:1.05;color:#fff;margin-bottom:12px}
.dpills{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.dpill{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--text-dim)}
.dpill svg{width:14px;height:14px}
.dpill.rat{color:var(--gold)}
.dov{font-size:.97rem;line-height:1.75;color:rgba(240,236,228,.72);max-width:580px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.d-body{padding:0 72px 100px;max-width:1600px;margin:0 auto}
.rec-sec{margin-top:64px}
.rec-hd{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.rec-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.rec-ico.r{background:rgba(193,18,31,.15)}.rec-ico.g{background:rgba(255,209,102,.1)}
.rec-ttl{font-family:var(--ff-head);font-size:1.5rem;font-weight:700;color:#fff}
.rec-ttl em{font-style:italic;color:var(--red)}
.rec-ct{font-size:.74rem;color:var(--text-dim);letter-spacing:.06em;margin-left:auto}

/* BACK BTN */
.back-btn{position:fixed;top:84px;left:52px;z-index:8000;display:flex;align-items:center;gap:8px;font-size:.74rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);background:rgba(8,9,15,.72);border:1px solid var(--border);border-radius:100px;padding:9px 20px;cursor:none;backdrop-filter:blur(14px);transition:all .22s}
.back-btn:hover{color:var(--red);border-color:rgba(193,18,31,.4);background:rgba(193,18,31,.08)}
.back-btn svg{width:14px;height:14px}

/* REVEAL */
.rv{opacity:0;transform:translateY(18px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.rv.vis{opacity:1;transform:translateY(0)}

/* SPINNER */
.spin-w{display:flex;align-items:center;justify-content:center;padding:100px 0}
.spin{width:40px;height:40px;border-radius:50%;border:3px solid var(--border-hi);border-top-color:var(--red);animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:32px;right:32px;z-index:99997;background:var(--bg2);border:1px solid var(--border-hi);border-left:3px solid var(--red);border-radius:var(--radius);padding:14px 22px;font-size:.88rem;max-width:320px;box-shadow:0 12px 36px rgba(0,0,0,.5);transform:translateY(20px);opacity:0;transition:all .32s var(--spring);pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}

/* ERR */
.err{text-align:center;padding:80px 20px;color:var(--text-dim)}
.err h3{font-family:var(--ff-head);font-style:italic;font-size:1.5rem;color:var(--text);margin-bottom:8px}

/* VIEWS */
#vh{display:none}#vh.act{display:block}

/* RESPONSIVE */
@media(max-width:900px){
  nav{padding:0 20px}.nav-pills{display:none}
  #hero{padding:0 20px 60px}
  .hero-stats{right:20px;bottom:60px}.hero-dots{left:20px}
  #app-main{padding:0 20px 80px}
  #vs{padding:calc(var(--nav-h)+40px) 20px 80px}
  .dh-content{padding:0 24px 48px;gap:22px}.dp-box{width:110px}
  .d-body{padding:0 20px 80px}
  .back-btn{left:20px;top:78px}
  .so-close{right:20px;top:76px}
  body{cursor:auto}#cur,#cur-ring{display:none}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<!-- SPLASH -->
<div id="splash">
  <div class="spl-logo">RE<span>E</span>L</div>
  <div class="spl-bar">
    <div class="spl-d"></div><div class="spl-d"></div>
    <div class="spl-d"></div><div class="spl-d"></div>
  </div>
</div>

<!-- NAVBAR -->
<nav id="nav">
  <div class="nav-logo" id="logo">REEL<span class="nav-dot"></span></div>
  <div class="nav-pills" id="nav-pills">
    <button class="nav-pill act" data-cat="trending">Trending</button>
    <button class="nav-pill" data-cat="popular">Popular</button>
    <button class="nav-pill" data-cat="top_rated">Top Rated</button>
    <button class="nav-pill" data-cat="now_playing">In Theatres</button>
    <button class="nav-pill" data-cat="upcoming">Coming Soon</button>
  </div>
  <div class="nav-r">
    <button class="icon-btn" id="search-btn" title="Search (/)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</nav>

<!-- SEARCH OVERLAY -->
<div id="so">
  <button class="so-close" id="so-close">✕</button>
  <div class="so-inner">
    <div class="so-label">What are you in the mood for?</div>
    <div class="so-wrap">
      <input id="so-input" class="so-input" type="text" placeholder="Search any film, director, mood…" autocomplete="off"/>
      <svg class="so-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div class="ac-list" id="acl"></div>
    <div class="so-hint">Press <kbd>Enter</kbd> to search &nbsp;·&nbsp; <kbd>Esc</kbd> to close</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- HOME -->
  <div id="vh">
    <section id="hero">
      <div class="bd-layer" id="bda"></div>
      <div class="bd-layer" id="bdb"></div>
      <div class="hero-ov"></div>
      <div class="hero-scan"></div>
      <div class="hero-body">
        <div class="hero-ew">Cinema Rediscovered</div>
        <h1 class="hero-h1">Discover<br><em id="hcl">Trending</em></h1>
        <p class="hero-p">AI-powered recommendations. Thousands of films.<br>Curated for the way you feel tonight.</p>
        <div class="hero-acts">
          <button class="hbtn hbtn-p" id="hero-search-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Search Films
          </button>
          <button class="hbtn hbtn-s" id="hero-browse-btn">Browse All</button>
        </div>
      </div>
      <div class="hero-stats">
        <div><div class="h-stat-n">10K+</div><div class="h-stat-l">Films Catalogued</div></div>
        <div><div class="h-stat-n">AI</div><div class="h-stat-l">Powered Recs</div></div>
        <div><div class="h-stat-n" id="hcnt">—</div><div class="h-stat-l">Showing Now</div></div>
      </div>
      <div class="hero-dots" id="hdots"></div>
    </section>

    <div id="app-main">
      <div class="section">
        <div class="sec-head rv" id="shd">
          <div class="sec-title" id="stitle"><em>Trending</em> Right Now</div>
          <div class="sec-ct" id="sct"></div>
        </div>
        <div id="gw"></div>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div id="vs">
    <div id="srw"></div>
  </div>

  <!-- DETAILS -->
  <div id="vd">
    <div id="dw"></div>
  </div>

</div>

<div id="toast"></div>

<script>
/* ── CONFIG ── */
const API  = 'https://movie-rec-466x.onrender.com';
const IW   = 'https://image.tmdb.org/t/p/w500';
const IB   = 'https://image.tmdb.org/t/p/w1280';

/* ── STATE ── */
let view='home', cat='trending', acT=null, hT=null, hUrls=[], hIdx=0, hAct='a';

/* ── CURSOR ── */
const cur=document.getElementById('cur'), ring=document.getElementById('cur-ring');
let cx=0,cy=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;cur.style.left=cx+'px';cur.style.top=cy+'px'});
(function anim(){rx+=(cx-rx)*.12;ry+=(cy-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)})();
const hc=el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'))};

/* ── SPLASH ── */
window.addEventListener('load',()=>{
  setTimeout(()=>{document.getElementById('splash').classList.add('gone');showView('home');loadHome(cat)},1800)
});

/* ── TOAST ── */
let tT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),3500)}

/* ── API ── */
async function api(path,p={}){const u=new URL(API+path);Object.entries(p).forEach(([k,v])=>u.searchParams.set(k,v));const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json()}

/* ── VIEWS ── */
function showView(n){
  document.getElementById('vh').classList.toggle('act',n==='home');
  document.getElementById('vs').classList.toggle('act',n==='search');
  document.getElementById('vd').classList.toggle('act',n==='details');
  const hero=document.getElementById('hero');
  if(hero) hero.style.display=n==='home'?'flex':'none';
  document.getElementById('nav-pills').style.display=n==='home'?'flex':'none';
  let bb=document.querySelector('.back-btn');
  if(n==='details'){
    if(!bb){bb=document.createElement('button');bb.className='back-btn';bb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back';bb.onclick=goHome;hc(bb);document.body.appendChild(bb)}
    bb.style.display='flex';
  } else { if(bb) bb.style.display='none'; }
  view=n; window.scrollTo({top:0,behavior:'smooth'});
}

function goHome(){showView('home');loadHome(cat)}

/* ── HERO ROTATOR ── */
function setHeroBd(url){
  const a=document.getElementById('bda'),b=document.getElementById('bdb');
  const nxt=hAct==='a'?b:a, cur2=hAct==='a'?a:b;
  nxt.style.backgroundImage=`url(${url})`;nxt.style.opacity='1';cur2.style.opacity='0';
  hAct=hAct==='a'?'b':'a';
}
function startHero(urls){
  hUrls=urls.filter(Boolean);hIdx=0;clearInterval(hT);
  if(!hUrls.length)return;
  const dots=document.getElementById('hdots');
  dots.innerHTML=hUrls.map((_,i)=>`<div class="hdot${i===0?' act':''}" data-i="${i}"></div>`).join('');
  dots.querySelectorAll('.hdot').forEach(d=>{d.onclick=()=>jumpHero(+d.dataset.i);hc(d)});
  setHeroBd(hUrls[0]);
  hT=setInterval(()=>{hIdx=(hIdx+1)%hUrls.length;setHeroBd(hUrls[hIdx]);dots.querySelectorAll('.hdot').forEach((d,i)=>d.classList.toggle('act',i===hIdx))},5000);
}
function jumpHero(i){hIdx=i;setHeroBd(hUrls[i]);document.querySelectorAll('.hdot').forEach((d,j)=>d.classList.toggle('act',j===i))}

/* ── CARD ── */
const catLbl={trending:'Trending',popular:'Popular',top_rated:'Top Rated',now_playing:'In Theatres',upcoming:'Coming Soon'};
const catTi={trending:'<em>Trending</em> Right Now',popular:'<em>Most</em> Popular',top_rated:'<em>Top</em> Rated',now_playing:'<em>In</em> Theatres',upcoming:'<em>Coming</em> Soon'};

function mkCard(m,i=0){
  const id=m.tmdb_id||m.id, title=m.title||'Untitled';
  const poster=m.poster_url||(m.poster_path?IW+m.poster_path:null);
  const year=(m.release_date||'').slice(0,4);
  const rat=m.vote_average?Math.round(m.vote_average*10)/10:null;
  const pHTML=poster?`<img class="card-img" src="${poster}" alt="${escH(title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-ph>🎬</div>'">`:`<div class="card-ph">🎬</div>`;
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`<div class="card-pw">${pHTML}<div class="card-shine"></div>${rat?`<div class="card-badge">★ ${rat}</div>`:''}<div class="card-ov"><button class="card-obtn">Open</button><div class="card-ov-title">${escH(title)}</div></div></div><div class="card-body"><div class="card-name">${escH(title)}</div><div class="card-meta">${rat?`<span style="color:var(--gold)">★ ${rat}</span>`:''}${year?`<span>${year}</span>`:''}</div></div>`;
  d.addEventListener('mousemove',e=>{const r=d.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;d.style.transform=`perspective(700px) rotateY(${x*13}deg) rotateX(${-y*13}deg) translateZ(8px)`});
  d.addEventListener('mouseleave',()=>{d.style.transform=''});
  d.addEventListener('click',()=>id&&openDetails(id));
  hc(d); return d;
}

function escH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function mkSkels(n=12){return Array.from({length:n},(_,i)=>{const d=document.createElement('div');d.className='skel';d.style.animationDelay=`${i*.07}s`;d.innerHTML='<div class="skel-p"></div><div class="skel-l"></div><div class="skel-l sh"></div>';return d})}

function renderGrid(wrap,movies){
  const g=document.createElement('div');g.className='grid';
  movies.forEach((m,i)=>g.appendChild(mkCard(m,i)));
  wrap.innerHTML='';wrap.appendChild(g);
  observeRv(g.querySelectorAll('.card'));
}

/* ── HOME ── */
async function loadHome(c='trending'){
  cat=c;
  document.getElementById('stitle').innerHTML=catTi[c]||'<em>Films</em>';
  document.getElementById('hcl').textContent=catLbl[c]||c;
  const gw=document.getElementById('gw');
  gw.innerHTML='';
  const sg=document.createElement('div');sg.className='grid';
  mkSkels(24).forEach(s=>sg.appendChild(s));gw.appendChild(sg);
  try{
    const data=await api('/home',{category:c,limit:24});
    document.getElementById('sct').textContent=`${data.length} films`;
    document.getElementById('hcnt').textContent=data.length;
    renderGrid(gw,data);
    // hero backdrops — try backdrop_url first, fallback to poster
    const bds=data.slice(0,8).map(m=>m.backdrop_url||null).filter(Boolean);
    startHero(bds.length?bds:data.slice(0,8).map(m=>m.poster_url).filter(Boolean));
    setTimeout(()=>document.getElementById('shd').classList.add('vis'),100);
  }catch(e){
    gw.innerHTML='<div class="err"><h3>Couldn\'t load films</h3><p>Check your connection.</p></div>';
    toast('Failed to load home feed');
  }
}

/* ── SEARCH OVERLAY ── */
function openSO(){document.getElementById('so').classList.add('open');setTimeout(()=>document.getElementById('so-input').focus(),50)}
function closeSO(){document.getElementById('so').classList.remove('open');document.getElementById('so-input').value='';document.getElementById('acl').classList.remove('show')}
document.getElementById('search-btn').addEventListener('click',openSO);
document.getElementById('so-close').addEventListener('click',closeSO);
hc(document.getElementById('search-btn'));hc(document.getElementById('so-close'));

const soInput=document.getElementById('so-input'), acl=document.getElementById('acl');
soInput.addEventListener('input',()=>{const q=soInput.value.trim();clearTimeout(acT);if(q.length<2){acl.classList.remove('show');return}acT=setTimeout(()=>fetchAc(q),220)});
soInput.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=soInput.value.trim();if(q.length<2)return;closeSO();doSearch(q)}if(e.key==='Escape')closeSO()});

async function fetchAc(q){
  try{
    const data=await api('/tmdb/search',{query:q,page:1});
    const res=(data.results||[]).slice(0,7);
    if(!res.length){acl.classList.remove('show');return}
    acl.innerHTML=res.map(m=>{
      const thumb=m.poster_path?`<img class="ac-thumb" src="${IW+m.poster_path}" alt="" onerror="this.style.display='none'">`:`<div class="ac-ph">🎬</div>`;
      const year=(m.release_date||'').slice(0,4);
      const rat=m.vote_average?`★ ${Math.round(m.vote_average*10)/10}`:'';
      return `<div class="ac-item" data-id="${m.id}">${thumb}<div class="ac-name">${escH(m.title)}</div><div class="ac-sub">${[year,rat].filter(Boolean).join(' · ')}</div></div>`;
    }).join('');
    acl.querySelectorAll('.ac-item').forEach(el=>{el.addEventListener('click',()=>{closeSO();openDetails(+el.dataset.id)});hc(el)});
    acl.classList.add('show');
  }catch{acl.classList.remove('show')}
}

/* ── SEARCH RESULTS ── */
async function doSearch(q){
  showView('search');
  const w=document.getElementById('srw');
  w.innerHTML=`<div class="sr-head"><h2>Results for <strong>"${escH(q)}"</strong></h2><p>Searching the catalogue…</p></div><div class="spin-w"><div class="spin"></div></div>`;
  try{
    const data=await api('/tmdb/search',{query:q,page:1});
    const res=data.results||[];
    w.innerHTML=`<div class="sr-head rv vis"><h2>Results for <strong>"${escH(q)}"</strong></h2><p>${(data.total_results||res.length).toLocaleString()} films found</p></div>`;
    if(!res.length){w.innerHTML+='<div class="err"><h3>No results found</h3><p>Try a different keyword.</p></div>';return}
    const movies=res.map(m=>({tmdb_id:m.id,title:m.title,poster_url:m.poster_path?IW+m.poster_path:null,release_date:m.release_date,vote_average:m.vote_average}));
    const gw=document.createElement('div');renderGrid(gw,movies);w.appendChild(gw);
  }catch{w.innerHTML+='<div class="err"><h3>Search failed</h3><p>Please try again.</p></div>';toast('Search error')}
}

/* ── DETAILS ── */
async function openDetails(id){
  if(!id)return;closeSO();showView('details');
  const dw=document.getElementById('dw');
  dw.innerHTML='<div class="spin-w" style="height:100vh"><div class="spin"></div></div>';
  try{
    const data=await api(`/movie/id/${id}`);
    renderDHero(data,dw);
    fetchRecs(data.title,id);
  }catch{
    dw.innerHTML='<div class="err" style="height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center"><h3>Couldn\'t load this film</h3><p>Please try again.</p></div>';
    toast('Failed to load movie');
  }
}

function renderDHero(data,wrap){
  const genres=(data.genres||[]).map(g=>`<span class="gpill">${escH(g.name)}</span>`).join('');
  const year=(data.release_date||'').slice(0,4);
  const rat=data.vote_average?`★ ${Math.round(data.vote_average*10)/10}`:null;
  const bd=data.backdrop_url||'';
  const poster=data.poster_url||'';
  const pEl=poster?`<div class="dp-box"><img src="${poster}" alt="${escH(data.title||'')}" loading="eager"/></div>`:`<div class="dp-ph">🎬</div>`;
  wrap.innerHTML=`
    <div class="dh">
      <div class="dh-bg" id="dhbg" style="background-image:url('${bd||poster}')"></div>
      <div class="dh-ov"></div>
      <div class="dh-content">
        ${pEl}
        <div class="dm">
          ${genres?`<div class="dg">${genres}</div>`:''}
          <h1 class="dt">${escH(data.title||'Untitled')}</h1>
          <div class="dpills">
            ${year?`<span class="dpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${year}</span>`:''}
            ${rat?`<span class="dpill rat"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${rat}</span>`:''}
          </div>
          ${data.overview?`<div class="dov">${escH(data.overview)}</div>`:''}
        </div>
      </div>
    </div>
    <div class="d-body" id="drecs"><div class="spin-w"><div class="spin"></div></div></div>`;

  // parallax
  const bgEl=document.getElementById('dhbg');
  const onScroll=()=>{if(view!=='details')return;if(bgEl)bgEl.style.transform=`translateY(${window.scrollY*.25}px)`};
  window.addEventListener('scroll',onScroll,{passive:true});
  wrap.querySelectorAll('button').forEach(hc);
}

async function fetchRecs(title,tmdbId){
  const rw=document.getElementById('drecs');
  if(!rw)return;
  try{
    const bundle=await api('/movie/search',{query:title,tfidf_top_n:12,genre_limit:12});
    const tCards=(bundle.tfidf_recommendations||[]).filter(x=>x.tmdb?.tmdb_id).map(x=>({tmdb_id:x.tmdb.tmdb_id,title:x.tmdb.title||x.title,poster_url:x.tmdb.poster_url,release_date:x.tmdb.release_date,vote_average:x.tmdb.vote_average}));
    const gCards=bundle.genre_recommendations||[];
    rw.innerHTML='';
    if(tCards.length){const s=mkRecSec('🎯','<em>Similar</em> Films','r',tCards.length);rw.appendChild(s.el);renderGrid(s.gw,tCards)}
    if(gCards.length){const s=mkRecSec('🎭','More in This <em>Genre</em>','g',gCards.length);rw.appendChild(s.el);renderGrid(s.gw,gCards)}
    if(!tCards.length&&!gCards.length){await fallbackRec(tmdbId,rw)}
  }catch{await fallbackRec(tmdbId,rw)}
}

async function fallbackRec(id,rw){
  try{const data=await api('/recommend/genre',{tmdb_id:id,limit:18});if(data.length){rw.innerHTML='';const s=mkRecSec('🎭','You Might <em>Also Like</em>','g',data.length);rw.appendChild(s.el);renderGrid(s.gw,data)}else rw.innerHTML=''}catch{rw.innerHTML=''}
}

function mkRecSec(icon,titleHTML,cls,count){
  const el=document.createElement('div');el.className='rec-sec';
  const gw=document.createElement('div');
  el.innerHTML=`<div class="rec-hd"><div class="rec-ico ${cls}">${icon}</div><div class="rec-ttl">${titleHTML}</div><div class="rec-ct">${count} films</div></div>`;
  el.appendChild(gw);return{el,gw};
}

/* ── SCROLL REVEAL ── */
const ro=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:.08});
function observeRv(els){els.forEach(el=>{el.classList.add('rv');ro.observe(el)})}

/* ── NAV EVENTS ── */
document.querySelectorAll('.nav-pill').forEach(b=>{
  b.addEventListener('click',()=>{document.querySelectorAll('.nav-pill').forEach(x=>x.classList.remove('act'));b.classList.add('act');loadHome(b.dataset.cat)});
  hc(b);
});
window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('solid',scrollY>80),{passive:true});
hc(document.getElementById('logo'));

/* ── HERO BTNS ── */
document.getElementById('hero-search-btn').addEventListener('click',openSO);
document.getElementById('hero-browse-btn').addEventListener('click',()=>document.querySelector('.section')?.scrollIntoView({behavior:'smooth',block:'start'}));
hc(document.getElementById('hero-search-btn'));hc(document.getElementById('hero-browse-btn'));

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&view==='home'&&!document.getElementById('so').classList.contains('open')){e.preventDefault();openSO()}
  if(e.key==='Escape'&&document.getElementById('so').classList.contains('open'))closeSO();
});
</script>
</body>
</html>
